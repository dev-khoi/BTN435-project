<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Home Control Panel</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
</head>
<body class="bg-light">
  <main class="container py-4">
    <header class="card shadow-sm border-0 mb-3">
      <div class="card-body">
        <h1 class="h3 mb-2">Smart Home Dashboard</h1>
        <p class="text-muted mb-1">Web control panel for the existing C++ TCP server protocol.</p>
        <p class="small mb-0">Bridge API: <code>http://localhost:3000/api/command</code></p>
      </div>
    </header>

    <section class="row g-3">
      <article class="col-12 col-md-6 col-lg-3">
        <div class="card h-100 shadow-sm border-0">
          <div class="card-body">
            <h2 class="h5">Light</h2>
            <div class="d-flex flex-wrap gap-2">
              <button class="cmd-btn btn btn-success" data-command="GET /light/on">ON</button>
              <button class="cmd-btn btn btn-danger" data-command="GET /light/off">OFF</button>
              <button class="cmd-btn btn btn-primary" data-command="GET /light/status">STATUS</button>
            </div>
          </div>
        </div>
      </article>

      <article class="col-12 col-md-6 col-lg-3">
        <div class="card h-100 shadow-sm border-0">
          <div class="card-body">
            <h2 class="h5">Thermostat</h2>
            <div class="input-group mb-2">
              <input id="tempInput" class="form-control" type="number" min="5" max="40" placeholder="Set °C">
              <button id="setTempBtn" class="cmd-btn btn btn-primary">SET</button>
            </div>
            <div class="d-flex flex-wrap gap-2">
              <button class="cmd-btn btn btn-primary" data-command="GET /thermostat/status">STATUS</button>
            </div>
          </div>
        </div>
      </article>

      <article class="col-12 col-md-6 col-lg-3">
        <div class="card h-100 shadow-sm border-0">
          <div class="card-body">
            <h2 class="h5">Camera</h2>
            <div class="d-flex flex-wrap gap-2">
              <button class="cmd-btn btn btn-primary" data-command="GET /camera/status">CHECK STATUS</button>
            </div>
          </div>
        </div>
      </article>

      <article class="col-12 col-md-6 col-lg-3">
        <div class="card h-100 shadow-sm border-0">
          <div class="card-body">
            <h2 class="h5">Network Diagnostics</h2>
            <div class="d-flex flex-wrap gap-2">
              <button class="cmd-btn btn btn-primary" data-command="GET /network/routing">ROUTING TABLE</button>
              <button class="cmd-btn btn btn-primary" data-command="GET /network/arp">ARP TABLE</button>
            </div>
          </div>
        </div>
      </article>
    </section>

    <section class="card shadow-sm border-0 mt-3">
      <div class="card-body">
        <h2 class="h5">Server Response</h2>
        <p id="lastCommand" class="text-muted mb-2">Command: -</p>
        <pre id="output" class="bg-dark text-light p-3 rounded mb-0" style="max-height: 320px; overflow: auto; white-space: pre-wrap; word-break: break-word;">No response yet.</pre>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
